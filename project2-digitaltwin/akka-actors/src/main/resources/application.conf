# Config de Akka Remoting para repartir los actores entre dos portatiles.
# Por defecto se queda en localhost (modo de un solo proceso, igual que
# antes), y cada maquina la sobreescribe con sus propias variables de
# entorno antes de arrancar - el mismo patron que ya usamos con
# KAFKA_BROKER en el resto del proyecto.
akka {
  actor {
    provider = remote

    # los 5 mensajes (ParentUpdateMsg, AppMsg, etc.) son records de Java
    # sencillos, sin nada especial - usamos la serializacion de Java de
    # base en vez de montar un serializador Jackson para esto
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
  }

  remote {
    artery {
      transport = tcp
      canonical.hostname = "127.0.0.1"
      canonical.hostname = ${?AKKA_REMOTE_HOST}
      canonical.port = 25520
      canonical.port = ${?AKKA_REMOTE_PORT}

      # nos bindeamos a todas las interfaces, aunque anunciemos (canonical)
      # solo la IP de Tailscale - asi no importa por cual de las interfaces
      # de WSL/Windows llegue el trafico
      bind.hostname = "0.0.0.0"
      bind.port = ${?AKKA_REMOTE_PORT}
    }
  }
}
